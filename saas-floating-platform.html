<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Floating Platform Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">

    <style>
        /* Local Fonts */
        @font-face {
            font-family: 'Deltha';
            src: url('./fonts/Deltha.otf') format('opentype'),
                url('./fonts/Deltha.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
            --platform-glow: rgba(255, 255, 255, 0.15);
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background */
        .ambient-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        nav {
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            position: relative;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.2em;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: color 0.3s;
            text-transform: uppercase;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            padding-bottom: 5vh;
        }

        /* FLOATING PLATFORM / STAGE */
        .platform-container {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            perspective: 1200px;
            pointer-events: none;
        }

        .platform {
            width: clamp(300px, 60vw, 800px);
            height: clamp(300px, 60vw, 800px);
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(20, 20, 20, 0.8) 0%, rgba(5, 5, 5, 0.2) 70%, transparent 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transform: rotateX(75deg) translateY(50px);
            box-shadow:
                0 0 100px var(--platform-glow),
                inset 0 0 60px rgba(255, 255, 255, 0.02);
            position: relative;
            animation: floatPlatform 8s ease-in-out infinite alternate;
        }

        .platform::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 105%;
            height: 105%;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            animation: spinSlow 30s linear infinite;
        }

        .platform::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 40%;
            border-radius: 50%;
            background: var(--platform-glow);
            filter: blur(80px);
        }

        /* Hero Content Container (sitting on platform conceptually) */
        .content-layer {
            text-align: center;
            max-width: 800px;
            padding: 0 20px;
            z-index: 20;
            position: relative;
            animation: floatContent 8s ease-in-out infinite alternate;
            /* Delay slightly differently from platform for parallax float */
            animation-delay: 0.5s;
        }

        .headline {
            font-family: 'Deltha', 'Clash Display', sans-serif;
            font-size: clamp(4rem, 9vw, 8rem);
            font-weight: normal;
            line-height: 0.85;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);

            opacity: 0;
            transform: translateY(40px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .description {
            font-size: clamp(1rem, 1.8vw, 1.25rem);
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto 3rem;

            opacity: 0;
            transform: translateY(30px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .cta-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;

            opacity: 0;
            transform: translateY(30px);
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem 2.8rem;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            border-radius: 99px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.15);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.25);
            background: #f0f0f0;
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Animations */
        @keyframes floatPlatform {
            0% {
                transform: rotateX(75deg) translateY(50px);
            }

            100% {
                transform: rotateX(75deg) translateY(10px);
            }
        }

        @keyframes floatContent {
            0% {
                transform: translateY(0px);
            }

            100% {
                transform: translateY(-15px);
            }
        }

        @keyframes spinSlow {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .cta-group {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .platform {
                width: 120vw;
                height: 120vw;
            }
        }
    </style>
</head>

<body>

    <div class="ambient-bg"></div>

    <nav>
        <a href="#" class="logo">LEVITY</a>
        <div class="nav-links">
            <a href="#">Solutions</a>
            <a href="#">Resources</a>
            <a href="#">Pricing</a>
        </div>
    </nav>

    <!-- Background Floating Platform Stage -->
    <div class="platform-container">
        <div class="platform"></div>
    </div>

    <!-- Foreground Content -->
    <main class="hero">
        <div class="content-layer">
            <h1 class="headline">Elevate</h1>
            <p class="description">A higher standard for operational intelligence. Suspend limitations and rise above
                the noise.</p>
            <div class="cta-group">
                <a href="#" class="btn btn-primary">Get Started</a>
                <a href="#" class="btn btn-secondary">Learn More</a>
            </div>
        </div>
    </main>

</body>

</html>
