<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Framed Spotlight Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">

    <style>
        /* Local Fonts */
        @font-face {
            font-family: 'Deltha';
            src: url('./fonts/Deltha.otf') format('opentype'),
                url('./fonts/Deltha.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #08050d;
            --text-main: #ffffff;
            --text-muted: #9c92b3;
            --frame-glow: #8f60ff;
            --frame-border: rgba(143, 96, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Subtle vignette on the body */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 30%, var(--bg-color) 100%);
            z-index: 5;
            pointer-events: none;
        }

        nav {
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            position: relative;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.1em;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            padding: 2rem;
        }

        /* The Illuminated Frame Spotlight */
        .frame-container {
            position: relative;
            width: 100%;
            max-width: 1100px;
            height: clamp(400px, 60vh, 700px);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--frame-border);
            border-radius: 2px;
            /* Sharp architectural corners */
            background: radial-gradient(circle at center, rgba(143, 96, 255, 0.08) 0%, transparent 70%);
            box-shadow:
                0 0 40px rgba(143, 96, 255, 0.1),
                inset 0 0 60px rgba(143, 96, 255, 0.05);
            animation: pulseFrame 8s ease-in-out infinite alternate;
        }

        /* Corner glowing accents on the frame */
        .frame-container::before,
        .frame-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Top Left and Bottom Right bracket glow */
        .frame-container::before {
            background:
                linear-gradient(to right, var(--frame-glow) 40px, transparent 40px) 0 0,
                linear-gradient(to bottom, var(--frame-glow) 40px, transparent 40px) 0 0,
                linear-gradient(to left, var(--frame-glow) 40px, transparent 40px) 100% 100%,
                linear-gradient(to top, var(--frame-glow) 40px, transparent 40px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 2px 2px;
            opacity: 0.8;
            box-shadow: 0 0 20px var(--frame-glow);
        }

        .content-layer {
            text-align: center;
            max-width: 800px;
            padding: 0 40px;
            z-index: 20;
        }

        .headline {
            font-family: 'Deltha', 'Clash Display', sans-serif;
            font-size: clamp(3.5rem, 7vw, 6.5rem);
            font-weight: normal;
            line-height: 0.9;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(143, 96, 255, 0.5);

            opacity: 0;
            transform: scale(0.95);
            animation: focusIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .description {
            font-size: clamp(1.05rem, 1.8vw, 1.25rem);
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 580px;
            margin: 0 auto 3rem;

            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        .cta-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;

            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem 2.8rem;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            border-radius: 2px;
            /* Match frame sharpness */
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--frame-glow);
            color: #ffffff;
            box-shadow: 0 0 20px rgba(143, 96, 255, 0.4);
        }

        .btn-primary:hover {
            background: #a37cff;
            box-shadow: 0 0 30px rgba(143, 96, 255, 0.6);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 1px solid var(--frame-border);
        }

        .btn-secondary:hover {
            background: rgba(143, 96, 255, 0.1);
            border-color: rgba(143, 96, 255, 0.8);
        }

        /* Animations */
        @keyframes pulseFrame {
            0% {
                box-shadow: 0 0 30px rgba(143, 96, 255, 0.1), inset 0 0 50px rgba(143, 96, 255, 0.05);
                border-color: rgba(143, 96, 255, 0.3);
            }

            100% {
                box-shadow: 0 0 60px rgba(143, 96, 255, 0.2), inset 0 0 80px rgba(143, 96, 255, 0.1);
                border-color: rgba(143, 96, 255, 0.6);
            }
        }

        @keyframes focusIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .frame-container {
                padding: 40px 0;
                height: auto;
                min-height: 60vh;
                border-left: none;
                border-right: none;
                border-radius: 0;
            }

            .cta-group {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="#" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="margin-right:8px;">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            FOCUS
        </a>
        <div class="nav-links">
            <a href="#">Showcase</a>
            <a href="#">Studio</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <main class="hero">
        <div class="frame-container">
            <div class="content-layer">
                <h1 class="headline">Envision</h1>
                <p class="description">Command attention where it matters. A highly focused UI stage designed to
                    spotlight your most critical narratives.</p>
                <div class="cta-group">
                    <a href="#" class="btn btn-primary">Take the Stage</a>
                    <a href="#" class="btn btn-secondary">Watch Reel</a>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
