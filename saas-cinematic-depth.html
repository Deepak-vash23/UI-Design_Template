<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Cinematic Depth Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">

    <style>
        /* Local Fonts */
        @font-face {
            font-family: 'Deltha';
            src: url('./fonts/Deltha.otf') format('opentype'),
                url('./fonts/Deltha.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-deep: #030008;
            /* Very deep dark purple/black */
            --bg-glow: #1a0b36;
            --text-main: #ffffff;
            --text-muted: #a6a2b8;
            --accent1: #8f60ff;
            --accent2: #ff4df7;
            --bloom-color: rgba(143, 96, 255, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Cinematic feel, keep it contained for the hero */
            position: relative;
        }

        /* Ambient Cinematic Lighting & Depth Textures */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120vw;
            height: 120vh;
            background: radial-gradient(circle at center, var(--bg-glow) 0%, var(--bg-deep) 60%);
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 12s ease-in-out infinite alternate;
        }

        .bloom-light {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vh;
            background: var(--bloom-color);
            filter: blur(140px);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        .grain-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            opacity: 0.08;
            /* Cinematic film grain */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Abstract depth blur objects (particles/out of focus elements) */
        .bokeh {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.0));
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 3;
            animation: floatComplex 20s infinite ease-in-out alternate;
        }

        .bokeh-1 {
            width: 300px;
            height: 300px;
            top: -10%;
            left: -5%;
            filter: blur(15px);
        }

        .bokeh-2 {
            width: 150px;
            height: 150px;
            bottom: 10%;
            right: 15%;
            filter: blur(25px);
            animation-delay: -5s;
        }

        .bokeh-3 {
            width: 80px;
            height: 80px;
            top: 30%;
            right: 5%;
            filter: blur(8px);
            animation-delay: -12s;
        }

        nav {
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            position: relative;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.15em;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.4s;
        }

        .nav-links a:hover {
            color: var(--text-main);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem 20px 6rem;
            z-index: 10;
            text-align: center;
        }

        .hero-content {
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .badge-pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: #d1c4ff;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: fadeInReveal 1s ease-out forwards;
        }

        .badge-pill span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent1);
            margin-right: 8px;
            box-shadow: 0 0 8px var(--accent1);
        }

        .headline {
            font-family: 'Deltha', 'Clash Display', sans-serif;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: normal;
            line-height: 0.9;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            /* Cinematic vibrant gradient text */
            background: linear-gradient(180deg, #ffffff 0%, #c4b5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 10px 40px rgba(143, 96, 255, 0.3);
            text-transform: uppercase;

            opacity: 0;
            transform: scale(0.95);
            animation: cinematicZoomIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .description {
            font-size: clamp(1.1rem, 2vw, 1.35rem);
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto 3rem;
            font-weight: 300;

            opacity: 0;
            transform: translateY(20px);
            animation: fadeInReveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        .cta-group {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInReveal 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem 2.5rem;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 99px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            color: var(--bg-deep);
            background: linear-gradient(135deg, #ffffff, #e0d0ff);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2), inset 0 -2px 5px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.4), inset 0 -2px 5px rgba(0, 0, 0, 0.1);
        }

        .btn-secondary {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }

        /* Animations */
        @keyframes pulseGlow {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }

        @keyframes floatComplex {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(30px, -50px) rotate(10deg);
            }

            66% {
                transform: translate(-20px, 20px) rotate(-5deg);
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        @keyframes cinematicZoomIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeInReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .cta-group {
                flex-direction: column;
                width: 100%;
                padding: 0 20px;
            }

            .btn {
                width: 100%;
            }

            body {
                overflow-y: auto;
            }

            /* Allow scroll on mobile */
        }
    </style>
</head>

<body>

    <!-- Cinematic Background Layers -->
    <div class="ambient-glow"></div>
    <div class="bloom-light"></div>
    <div class="grain-overlay"></div>

    <!-- Abstract Depth Objects -->
    <div class="bokeh bokeh-1"></div>
    <div class="bokeh bokeh-2"></div>
    <div class="bokeh bokeh-3"></div>

    <nav>
        <a href="#" class="logo">OBLIVION</a>
        <div class="nav-links">
            <a href="#">Vision</a>
            <a href="#">Engine</a>
            <a href="#">Network</a>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <div class="badge-pill">
                <span></span> V4 Core Now Live
            </div>

            <h1 class="headline">Immerse</h1>

            <p class="description">Dive into the abyssal depths of rendering technology. Create worlds with unparalleled
                cinematic realism and performance.</p>

            <div class="cta-group">
                <a href="#" class="btn btn-primary">Enter the Engine</a>
                <a href="#" class="btn btn-secondary">Watch Trailer</a>
            </div>
        </div>
    </main>

</body>

</html>
