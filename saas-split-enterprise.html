<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Split Enterprise Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&display=swap" rel="stylesheet">

    <style>
        /* Local Fonts */
        @font-face {
            font-family: 'Deltha';
            src: url('./fonts/Deltha.otf') format('opentype'),
                url('./fonts/Deltha.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #060608;
            --surface-color: #0a0a0c;
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
            --accent: #5e6ad2;
            --border-color: rgba(255, 255, 255, 0.08);
            --gradient-light: radial-gradient(circle at 80% 50%, rgba(94, 106, 210, 0.15) 0%, rgba(0, 0, 0, 0) 50%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: var(--gradient-light);
            background-size: 100vw 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        nav {
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(6, 6, 8, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--text-main), var(--accent));
            border-radius: 6px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 5% 4rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            min-height: 100vh;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6rem;
            align-items: center;
            width: 100%;
        }

        /* Left Side Content */
        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 10;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(94, 106, 210, 0.1);
            border: 1px solid rgba(94, 106, 210, 0.3);
            color: #a4afff;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .headline {
            font-family: 'Deltha', 'Clash Display', sans-serif;
            font-size: clamp(3.5rem, 6vw, 5.5rem);
            font-weight: normal;
            line-height: 0.95;
            letter-spacing: -0.01em;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            color: #ffffff;
        }

        .description {
            font-size: clamp(1.1rem, 1.5vw, 1.25rem);
            color: var(--text-muted);
            line-height: 1.7;
            max-width: 520px;
            margin-bottom: 3rem;
        }

        .cta-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem 2.5rem;
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: 1px solid transparent;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(94, 106, 210, 0.4);
        }

        .btn-primary:hover {
            background: #6e7aee;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(94, 106, 210, 0.5);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem 2.5rem;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Right Side Visual Element */
        .hero-visual {
            position: relative;
            width: 100%;
            height: clamp(400px, 60vh, 600px);
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .visual-card {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, rgba(20, 20, 24, 0.8) 0%, rgba(10, 10, 12, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transform: rotateY(-15deg) rotateX(5deg);
            transform-style: preserve-3d;
            animation: float 8s ease-in-out infinite alternate;
        }

        /* Abstract UI elements inside the visual card */
        .ui-header {
            height: 60px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
        }

        .ui-body {
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            height: calc(100% - 60px);
        }

        .ui-chart {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
            flex: 1;
        }

        .ui-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(94, 106, 210, 0.2), transparent);
            border-top: 2px solid var(--accent);
            clip-path: polygon(0 40%, 20% 60%, 40% 30%, 60% 70%, 80% 20%, 100% 50%, 100% 100%, 0 100%);
        }

        /* Animations */
        @keyframes float {
            0% {
                transform: translateY(0px) rotateY(-15deg) rotateX(5deg);
            }

            100% {
                transform: translateY(-20px) rotateY(-10deg) rotateX(8deg);
            }
        }

        /* Staggered Load In */
        .hero-content>* {
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .hero-content .badge {
            animation-delay: 0.1s;
        }

        .hero-content .headline {
            animation-delay: 0.2s;
        }

        .hero-content .description {
            animation-delay: 0.3s;
        }

        .hero-content .cta-group {
            animation-delay: 0.4s;
        }

        .hero-visual {
            animation: fadeInScale 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 1024px) {
            .hero-grid {
                grid-template-columns: 1fr;
                gap: 4rem;
                text-align: center;
            }

            .hero-content {
                align-items: center;
            }

            .hero-visual {
                height: 400px;
            }

            .visual-card {
                transform: rotateY(0) rotateX(0);
                animation: floatSimple 6s ease-in-out infinite alternate;
            }

            @keyframes floatSimple {
                0% {
                    transform: translateY(0);
                }

                100% {
                    transform: translateY(-15px);
                }
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .cta-group {
                flex-direction: column;
                width: 100%;
            }

            .cta-group a {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="#" class="logo">
            <div class="logo-icon"></div>
            NEXUS
        </a>
        <div class="nav-links">
            <a href="#">Features</a>
            <a href="#">Integration</a>
            <a href="#">Pricing</a>
            <a href="#">Company</a>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-grid">
            <!-- Left Side: Text Content -->
            <div class="hero-content">
                <div class="badge">Enterprise Grade</div>
                <h1 class="headline">Orchestrate Scality</h1>
                <p class="description">Empower your teams with the ultimate architecture for infinite scale. Combine
                    enterprise security with fluid developer experience.</p>
                <div class="cta-group">
                    <a href="#" class="btn-primary">Start Building</a>
                    <a href="#" class="btn-secondary">View Documentation</a>
                </div>
            </div>

            <!-- Right Side: Visual Element (Abstract Dashboard) -->
            <div class="hero-visual">
                <div class="visual-card">
                    <div class="ui-header">
                        <div class="dot" style="background:#ff5f56"></div>
                        <div class="dot" style="background:#ffbd2e"></div>
                        <div class="dot" style="background:#27c93f"></div>
                    </div>
                    <div class="ui-body">
                        <div class="ui-chart" style="height: 120px;">
                            <div class="ui-line"></div>
                        </div>
                        <div style="display: flex; gap: 20px; height: 180px;">
                            <div class="ui-chart" style="flex: 2;"></div>
                            <div class="ui-chart" style="flex: 1;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
