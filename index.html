<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Design Showcase — Template Gallery</title>
    <meta name="description"
        content="Browse 31 stunning UI design templates across various aesthetics including 4 school website designs." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0b14;
            --surface: #11131f;
            --surface2: #181b2e;
            --border: rgba(255, 255, 255, 0.07);
            --accent1: #7c6aff;
            --accent2: #ff6ac1;
            --accent3: #38e8ff;
            --text-primary: #f0f2ff;
            --text-secondary: #8890b5;
            --text-muted: #4a5078;
            --glow1: rgba(124, 106, 255, 0.35);
            --glow2: rgba(255, 106, 193, 0.25);
            --glow3: rgba(56, 232, 255, 0.2);
            --card-r: 16px;
            --transition: 0.28s cubic-bezier(.4, 0, .2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient background orbs */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.45;
            animation: drift 18s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 520px;
            height: 520px;
            background: var(--glow1);
            top: -160px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 380px;
            height: 380px;
            background: var(--glow2);
            bottom: -80px;
            right: -80px;
            animation-delay: -6s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: var(--glow3);
            top: 40%;
            left: 55%;
            animation-delay: -12s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(40px, 30px) scale(1.08);
            }
        }

        .page {
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            padding: 80px 24px 56px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(124, 106, 255, 0.12);
            border: 1px solid rgba(124, 106, 255, 0.3);
            color: #a89fff;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 999px;
            margin-bottom: 24px;
        }

        .badge::before {
            content: '✦';
            font-size: 10px;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.4rem, 5vw, 4.2rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 30%, var(--accent1) 60%, var(--accent2) 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 18px;
        }

        header p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            max-width: 560px;
            margin: 0 auto 40px;
            line-height: 1.7;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 48px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat-num {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent1), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Search */
        .controls {
            max-width: 540px;
            margin: 0 auto 52px;
            padding: 0 24px;
        }

        .search-wrap {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
            pointer-events: none;
        }

        #search {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            padding: 14px 18px 14px 48px;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        #search::placeholder {
            color: var(--text-muted);
        }

        #search:focus {
            border-color: rgba(124, 106, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.14);
        }

        /* Result count */
        .result-count {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 28px;
            min-height: 1.2em;
        }

        /* Grid */
        .grid-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 24px 100px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--card-r);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
            position: relative;
            cursor: pointer;
            animation: fadeUp 0.5s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--card-r);
            background: linear-gradient(135deg, rgba(124, 106, 255, 0.08), transparent 60%);
            opacity: 0;
            transition: opacity var(--transition);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-7px);
            border-color: rgba(124, 106, 255, 0.45);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(124, 106, 255, 0.18);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-stripe {
            height: 3px;
            width: 100%;
            flex-shrink: 0;
        }

        .card-body {
            padding: 20px 20px 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-header-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .card-icon {
            width: 46px;
            height: 46px;
            border-radius: 13px;
            display: grid;
            place-items: center;
            font-size: 22px;
            background: var(--surface2);
            border: 1px solid var(--border);
            flex-shrink: 0;
            transition: transform 0.22s ease;
        }

        .card:hover .card-icon {
            transform: scale(1.12) rotate(-4deg);
        }

        .card-meta {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            padding: 2px 9px;
            border-radius: 999px;
        }

        .card-desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.65;
            flex: 1;
        }

        .card-cta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #8a7fff;
            opacity: 0;
            transform: translateX(-5px);
            transition: opacity var(--transition), transform var(--transition);
            margin-top: 4px;
        }

        .card:hover .card-cta {
            opacity: 1;
            transform: translateX(0);
        }

        .arrow-icon {
            transition: transform 0.2s;
        }

        .card:hover .arrow-icon {
            transform: translateX(4px);
        }

        /* Empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .e-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 28px;
            font-size: 0.82rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: #1e2040;
            border-radius: 4px;
        }

        @media (max-width: 600px) {
            header {
                padding: 56px 16px 36px;
            }

            .stats-bar {
                gap: 28px;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="page">

        <header>
            <div class="badge">UI Design Gallery</div>
            <h1>UI Template Showcase</h1>
            <p>A curated collection of UI design templates. Click any card to open the live template.</p>
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-num">11</div>
                    <div class="stat-label">Templates</div>
                </div>
                <div class="stat">
                    <div class="stat-num">11</div>
                    <div class="stat-label">Styles</div>
                </div>
                <div class="stat">
                    <div class="stat-num">HTML</div>
                    <div class="stat-label">Pure CSS</div>
                </div>
            </div>
        </header>

        <div class="controls">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input id="search" type="text" placeholder="Search by name, style or tag…" autocomplete="off" />
            </div>
        </div>

        <div class="result-count" id="result-count">Showing all 11 templates</div>

        <div class="grid-container">
            <div class="grid" id="grid"></div>
        </div>

        <footer>UI Design Showcase &nbsp;·&nbsp; 11 Templates &nbsp;·&nbsp; Click any card to open the template
        </footer>
    </div>

    <script>
        const templates = [
            { file: 'saas-floating-platform.html', title: 'SaaS – Floating Platform', icon: '🛸', tag: 'SaaS', desc: 'A dark hero where the content beautifully floats above a glowing, rotating 3D platform stage.', stripe: '#050505,#ffffff' },
            { file: 'saas-infinite-horizon.html', title: 'SaaS – Infinite Horizon', icon: '🌅', tag: 'SaaS', desc: 'A deeply expansive, futuristic layout with a glowing horizon line that uniquely illuminates the Deltha typography from below.', stripe: '#040810,#38bdf8' },
            { file: 'saas-cinematic-depth.html', title: 'SaaS – Cinematic Depth', icon: '🎬', tag: 'SaaS', desc: 'A deeply atmospheric hero with deep purples, heavy bloom blur lighting, floating particles, and film grain.', stripe: '#030008,#8f60ff' },
            { file: 'saas-split-enterprise.html', title: 'SaaS – Split Enterprise', icon: '⚡', tag: 'SaaS', desc: 'A clean 50/50 split layout. Massive Deltha headline on the left and a floating 3D abstract visual dashboard on the right.', stripe: '#060608,#5e6ad2' },
            { file: 'saas-massive-central.html', title: 'SaaS – Massive Central', icon: '🌐', tag: 'SaaS', desc: 'A stunning hero layout focused entirely on a large central 3D-like hemisphere object with Deltha typography.', stripe: '#000000,#ffffff' },
            { file: 'saas-dark-spotlight.html', title: 'SaaS – Dark Spotlight', icon: '🔦', tag: 'SaaS', desc: 'Dark theme hero with massive Deltha typography, a dramatic top-center spotlight, and subtle glowing texture.', stripe: '#333333,#ffffff' },
            { file: 'school-institutional.html', title: 'School – Institutional', icon: '🏛️', tag: 'School', desc: 'Clean institutional UI with white background, navy accents, notice board, and structured layout. Best for CBSE/ICSE schools.', stripe: '#0f2a5c,#1a54b5' },
            { file: 'school-dashboard-portal.html', title: 'School – Dashboard Portal', icon: '📊', tag: 'School', desc: 'Card-based student portal with sidebar navigation, homework, attendance, timetable and fee cards.', stripe: '#3b82f6,#6366f1' },
            { file: 'school-minimal-hero.html', title: 'School – Minimal Hero', icon: '📢', tag: 'School', desc: 'Large bold typography hero — "Admissions Open 2026" with clear CTA, marquee, and clean sections below.', stripe: '#0a1628,#1a4fd8' },
            { file: 'school-magazine-editorial.html', title: 'School – Magazine', icon: '📰', tag: 'School', desc: 'Editorial newspaper-style layout with article grid, events, opinion quotes, and notice board sidebar.', stripe: '#111,#c0392b' },
            { file: 'school-nitins-design.html', title: 'Nitin\'s Design', icon: '☁️', tag: 'School', desc: 'Warm skin-toned background, bold simple text, easy-access options with graphics, achievements section — clear as blue sky.', stripe: '#f0d5b8,#4da8da' },
        ];

        const tagColors = {
            'School': '#1a54b5',
            'SaaS': '#aaaaaa',
        };

        const grid = document.getElementById('grid');
        const countEl = document.getElementById('result-count');

        function renderCards(list) {
            grid.innerHTML = '';
            countEl.textContent = list.length === templates.length
                ? `Showing all ${templates.length} templates`
                : `Showing ${list.length} of ${templates.length} templates`;

            if (!list.length) {
                grid.innerHTML = `<div class="empty-state"><span class="e-icon">🔍</span><p>No templates match your search.</p></div>`;
                return;
            }

            list.forEach((t, i) => {
                const tc = tagColors[t.tag] || '#7c6aff';
                const stops = t.stripe.split(',');
                const gradStops = stops.map((c, idx) => `${c.trim()} ${Math.round(idx / (stops.length - 1) * 100)}%`).join(',');
                const a = document.createElement('a');
                a.href = t.file;
                a.className = 'card';
                a.title = `Open ${t.title}`;
                a.style.animationDelay = `${i * 35}ms`;
                a.innerHTML = `
      <div class="card-stripe" style="background:linear-gradient(90deg,${gradStops})"></div>
      <div class="card-body">
        <div class="card-header-row">
          <div class="card-icon">${t.icon}</div>
          <div class="card-meta">
            <div class="card-title">${t.title}</div>
            <span class="card-tag" style="color:${tc};background:${tc}1a">${t.tag}</span>
          </div>
        </div>
        <p class="card-desc">${t.desc}</p>
        <div class="card-cta">
          Open Template
          <svg class="arrow-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      </div>`;
                grid.appendChild(a);
            });
        }

        renderCards(templates);

        document.getElementById('search').addEventListener('input', function () {
            const q = this.value.toLowerCase().trim();
            renderCards(q ? templates.filter(t =>
                t.title.toLowerCase().includes(q) ||
                t.tag.toLowerCase().includes(q) ||
                t.desc.toLowerCase().includes(q)
            ) : templates);
        });
    </script>

</body>

</html>
