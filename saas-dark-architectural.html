<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dark Architectural Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">

    <style>
        /* Local Fonts */
        @font-face {
            font-family: 'Deltha';
            src: url('./fonts/Deltha.otf') format('opentype'),
                url('./fonts/Deltha.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #08080a;
            --text-main: #ffffff;
            --text-muted: #8d8d9b;
            --border-color: rgba(255, 255, 255, 0.06);
            --arch-shadow: rgba(0, 0, 0, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        nav {
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            position: relative;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.15em;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        /* BACKGROUND ARCHITECTURAL SHAPES */
        .architecture-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        /* Large abstract structural pillars / blocks */
        .arch-block {
            position: absolute;
            background: linear-gradient(135deg, #111114, #050508);
            border: 1px solid var(--border-color);
            box-shadow: 20px 20px 60px var(--arch-shadow);
        }

        .block-left {
            top: -10vh;
            left: -15vw;
            width: 35vw;
            height: 120vh;
            transform: skewX(-10deg);
            border-right: 2px solid rgba(255, 255, 255, 0.04);
            z-index: 2;
        }

        .block-right {
            bottom: -20vh;
            right: -10vw;
            width: 45vw;
            height: 80vh;
            transform: skewY(-15deg);
            border-top: 2px solid rgba(255, 255, 255, 0.03);
            z-index: 1;
        }

        .block-top {
            top: -20vh;
            right: 15vw;
            width: 50vw;
            height: 40vh;
            transform: skewX(20deg);
            background: linear-gradient(180deg, #18181c, transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            z-index: 0;
            opacity: 0.5;
        }

        /* Diagonal geometric lighting slice */
        .light-slice {
            position: absolute;
            top: 0;
            left: 20%;
            width: 4px;
            height: 150vh;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.8), transparent 80%);
            transform: rotate(25deg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            z-index: 3;
            opacity: 0.3;
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0 20px;
        }

        .content-layer {
            max-width: 1000px;
            background: rgba(8, 8, 10, 0.4);
            padding: 40px;
            border-radius: 4px;
            /* Minimal border radius to match brutalist/architectural vibe */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);

            animation: containerReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .badge {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #b4b4c4;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 6px;
        }

        .headline {
            font-family: 'Deltha', 'Clash Display', sans-serif;
            font-size: clamp(4rem, 9vw, 8rem);
            font-weight: normal;
            line-height: 0.85;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            color: #ffffff;
            text-transform: uppercase;
            /* Solid sharp colors for a concrete/structural feel */
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);

            opacity: 0;
            animation: textReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .description {
            font-size: clamp(1.1rem, 1.8vw, 1.3rem);
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 700px;
            margin: 0 auto 3rem;
            font-weight: 400;

            opacity: 0;
            animation: textReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
        }

        .cta-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;

            opacity: 0;
            animation: textReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 3.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            border-radius: 2px;
            /* Brutalist sharp corners */
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
        }

        .btn-primary:hover {
            background: transparent;
            color: #ffffff;
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #ffffff;
        }

        /* Animations */
        @keyframes containerReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes textReveal {
            from {
                opacity: 0;
                filter: blur(10px);
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                filter: blur(0);
                transform: scale(1);
            }
        }

        /* Structural ambient float for the background to make it feel slightly alive but heavy */
        .block-left {
            animation: heavyFloat 15s ease-in-out infinite alternate;
        }

        .block-right {
            animation: heavyFloat 18s ease-in-out infinite alternate-reverse;
        }

        @keyframes heavyFloat {
            0% {
                transform: skewX(-10deg) translateY(0);
            }

            100% {
                transform: skewX(-10deg) translateY(-20px);
            }
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .content-layer {
                padding: 30px 20px;
                border: none;
                background: transparent;
                box-shadow: none;
                backdrop-filter: none;
            }

            .cta-group {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .block-left {
                width: 80vw;
                left: -20vw;
            }

            .block-right {
                width: 100vw;
                right: -20vw;
                bottom: -30vh;
            }
        }
    </style>
</head>

<body>

    <!-- Architectural Background Structures -->
    <div class="architecture-container">
        <div class="arch-block block-top"></div>
        <div class="arch-block block-left"></div>
        <div class="arch-block block-right"></div>
        <div class="light-slice"></div>
    </div>

    <nav>
        <a href="#" class="logo">OVAL</a>
        <div class="nav-links">
            <a href="#">Architecture</a>
            <a href="#">Systems</a>
            <a href="#">Company</a>
        </div>
    </nav>

    <main class="hero">
        <div class="content-layer">
            <div class="badge">Structural Foundation</div>
            <h1 class="headline">Construct</h1>
            <p class="description">Build enterprise-grade applications on a foundation of absolute stability. The
                foremost powerful framework for monolithic design.</p>
            <div class="cta-group">
                <a href="#" class="btn btn-primary">Start Building</a>
                <a href="#" class="btn btn-secondary">Read Docs</a>
            </div>
        </div>
    </main>

</body>

</html>
