<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Massive Central Visual Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">

    <style>
        /* Local Fonts */
        @font-face {
            font-family: 'Deltha';
            src: url('./fonts/Deltha.otf') format('opentype'),
                url('./fonts/Deltha.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #050505;
            --surface-color: #0a0a0c;
            --text-main: #ffffff;
            --text-muted: #888890;
            --accent: #e0e0e0;
            --glow-color: rgba(255, 255, 255, 0.4);
            --gradient-light: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.06) 0%, rgba(0, 0, 0, 0) 60%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: var(--gradient-light);
            background-size: 150vw 150vh;
            background-position: center top;
            background-repeat: no-repeat;
        }

        nav {
            width: 100%;
            padding: 2rem 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            position: relative;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.1em;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem 20px 8rem;
            margin-top: -2rem;
            /* Pull up slightly behind nav */
            z-index: 10;
        }

        /* The Massive Central Visual Layer */
        .visual-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 2rem;
            /* Adjust responsiveness */
            height: clamp(200px, 35vh, 400px);
        }

        /* The Hemisphere Object */
        .hemisphere {
            width: clamp(300px, 60vw, 800px);
            height: clamp(150px, 30vw, 400px);
            /* Exactly half the width to form a hemisphere */
            border-radius: 800px 800px 0 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.0) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: none;
            position: relative;
            overflow: hidden;
            box-shadow:
                inset 0 30px 60px rgba(255, 255, 255, 0.05),
                0 -20px 80px rgba(255, 255, 255, 0.05);
            animation: floatSlow 6s ease-in-out infinite alternate;
        }

        /* Inner glowing core of the hemisphere */
        .hemisphere::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            filter: blur(40px);
        }

        /* Grid lines to make it look "abstract" and structural */
        .hemisphere-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center bottom;
            mask-image: radial-gradient(ellipse at 50% 100%, #000 0%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 100%, #000 0%, transparent 80%);
            border-radius: inherit;
        }

        /* Floor reflection line */
        .floor-line {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(400px, 80vw, 1000px);
            height: 1px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 100%);
            box-shadow: 0 -2px 20px rgba(255, 255, 255, 0.2);
            z-index: 1;
            animation: pulseLight 4s ease-in-out infinite alternate;
        }

        /* Content area below the visual */
        .content-layer {
            text-align: center;
            max-width: 800px;
            position: relative;
            z-index: 20;
        }

        .headline {
            font-family: 'Deltha', 'Clash Display', sans-serif;
            font-size: clamp(3rem, 8vw, 6.5rem);
            font-weight: normal;
            line-height: 1;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            text-transform: uppercase;
            /* Premium metallic/white gradient */
            background: linear-gradient(180deg, #ffffff 20%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 540px;
            margin: 0 auto 40px;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 3rem;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: #000;
            background: #fff;
            border: none;
            border-radius: 4px;
            /* Slightly sharper corners for modern abstract feel */
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.15);
            background: #f0f0f0;
        }

        /* Animations */
        @keyframes floatSlow {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-15px);
            }
        }

        @keyframes pulseLight {
            from {
                opacity: 0.6;
            }

            to {
                opacity: 1;
            }
        }

        /* Load-in animations */
        .visual-container {
            animation: fadeUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        .content-layer {
            animation: fadeUp 1s ease-out 0.3s forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            nav {
                padding: 1.5rem 20px;
            }

            .nav-links {
                display: none;
            }

            .hemisphere {
                width: 85vw;
                height: 42.5vw;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="#" class="logo">AURA</a>
        <div class="nav-links">
            <a href="#">Platform</a>
            <a href="#">Use Cases</a>
            <a href="#">Enterprise</a>
        </div>
    </nav>

    <main class="hero">
        <!-- Main Massive Central Visual -->
        <div class="visual-container">
            <div class="hemisphere">
                <div class="hemisphere-grid"></div>
            </div>
            <div class="floor-line"></div>
        </div>

        <!-- Text Content Below Object -->
        <div class="content-layer">
            <h1 class="headline">Singularity</h1>
            <p class="description">Experience the zenith of computational design. A unified intelligence platform
                structured for the future.</p>
            <a href="#" class="cta-button">Initiate Sequence</a>
        </div>
    </main>

</body>

</html>
